name: complex-ot-sandbox

hosts:
  # 1. Attacker workstation (runs Kali GUI)
  - name: attacker-host
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.large

  # 2. SCADA/HMI server (runs Node-RED)
  - name: scada-hmi
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  # 3. Engineering Workstation (runs administrative script/API)
  - name: engineering-station
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  # 4. Software PLC (runs OpenPLC)
  - name: openplc-node
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

routers:
  - name: ot-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: mgmt-net
    cidr: 10.10.10.0/24
  - name: operations-net
    cidr: 192.168.100.0/24
  - name: control-net
    cidr: 192.168.200.0/24

net_mappings:
  - host: attacker-host
    network: mgmt-net
    ip: 10.10.10.50

  - host: scada-hmi
    network: mgmt-net
    ip: 10.10.10.10

  - host: scada-hmi
    network: operations-net
    ip: 192.168.100.10

  - host: engineering-station
    network: operations-net
    ip: 192.168.100.20

  - host: engineering-station
    network: control-net
    ip: 192.168.200.20

  - host: openplc-node
    network: control-net
    ip: 192.168.200.10

router_mappings:
  - router: ot-router
    network: mgmt-net
    ip: 10.10.10.1

  - router: ot-router
    network: operations-net
    ip: 192.168.100.1

  - router: ot-router
    network: control-net
    ip: 192.168.200.1

groups: []
