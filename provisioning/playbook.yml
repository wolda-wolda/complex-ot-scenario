- name: Configure the Gateway Router
  hosts: ot-gateway
  become: yes
  roles:
    - router

- name: Configure the SCADA/HMI Node
  hosts: scada-hmi
  become: yes
  roles:
    - nodered

- name: Configure the IDMZ Jump Host
  hosts: dmz-jump
  become: yes
  roles:
    - dmz

- name: Configure the Engineering Workstation
  hosts: engineering-station
  become: yes
  roles:
    - ews

- name: Configure the Software PLC Node
  hosts: openplc-node
  become: yes
  roles:
    - openplc

- name: Configure the Attacker Workstation
  hosts: attacker-host
  become: yes
  tasks:
    - name: Deploy password dictionary for brute-forcing
      copy:
        dest: /home/debian/passlist.txt
        content: |
          password
          123456
          admin
          password123
          operator
          operator123
          letmein
          oracle
          engineer
          engineer123
          bacon
        owner: debian
        group: debian
        mode: '0644'
