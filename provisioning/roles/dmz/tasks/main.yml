---
- name: Install networking tools on DMZ jump host
  apt:
    name:
      - nmap
      - tcpdump
      - netcat-openbsd
    state: present
    update_cache: yes

- name: Create operator user group
  group:
    name: operator
    state: present

- name: Create operator user with operator123 password
  user:
    name: operator
    group: operator
    password: "$6$IQBxuzI0FCQdu5gU$NIohLB40Hwc7Uclsu9bIIMtOTRIPTLC1Bw39cwboypppwcpb1rNwXrS8up/SWB5056dSEuLZSZEW0CxMR5Pej0"
    shell: /bin/bash
    home: /home/operator
    create_home: yes

- name: Configure SSH to allow password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication yes'

- name: Restart SSH service
  systemd:
    name: ssh
    state: restarted

- name: Deploy Level 2 Flag file
  copy:
    dest: /home/operator/flag.txt
    content: "FLAG{IDMZ_JUMP_ACCESSED}\n"
    owner: operator
    group: operator
    mode: '0644'
